<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎁 JU & HR 상견례 선물추첨</title>
  <style>
    body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f0f4f8; }
    .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
    .gift-icon { font-size: 80px; margin-bottom: 20px; }
    .gift-title { color: #333; font-size: 24px; margin-bottom: 10px; }
    .gift-code-box { background-color: #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 20px; }
    .gift-code { font-size: 20px; font-weight: bold; color: #e53e3e; letter-spacing: 2px; }
    /* 링크가 걸린 코드의 디자인을 유지하기 위한 CSS 추가 */
    .gift-code a { color: #e53e3e; text-decoration: none; }
    .gift-code a:hover { text-decoration: underline; }
    .error { color: #e53e3e; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container" id="content-area">
    <h2>선물 정보를 불러오는 중...⏳</h2>
  </div>

  <script>
    // 1. 9개의 선물 데이터 베이스
    const giftData = {
      "1": { icon: "🛍️", title: "신세계 상품권 교환권 50,000원(이마트 전용)", code: "<a href='https://kko.to/ttY7Wq8e-u' target='_blank'>코드: 3DQ9RWEZ7C</a>" },
      "2": { icon: "🍿", title: "메가박스 2인 관람권", code: "BANA-0002" },
      "3": { icon: "🍗", title: "교촌치킨 허니콤보웨지감자세트", code: "MACD-0003" },
      "4": { icon: "☕", title: "스타벅스 아이스 카페 아메리카 T 2잔 + 부드러운 생크림 카스텔라", code: "TWOS-0004" },
      "5": { icon: "💄", title: "올리브영 기프트카드 1만원권", code: "BASK-0005" },
      "6": { icon: "🍨", title: "베스킨라빈스 파인트 아이스크림", code: "CHIC-0006" },
      "7": { icon: "🏪", title: "CU 모바일 상품권 5,000원", code: "DONU-0007" }
    };

    // 2. 접속한 주소(URL)에서 '?id=' 뒤의 숫자를 읽어오기
    const urlParams = new URLSearchParams(window.location.search);
    const giftId = urlParams.get('id');

    const contentArea = document.getElementById('content-area');

    // 3. 숫자에 맞는 선물 정보를 화면에 표시하기
    if (giftId && giftData[giftId]) {
      const gift = giftData[giftId];
      contentArea.innerHTML = `
        <div class="gift-icon">${gift.icon}</div>
        <div class="gift-title">축하합니다!</div>
        <p><strong>${gift.title}</strong> 당첨입니다.</p>
        <div class="gift-code-box">
          <p style="margin: 0 0 10px 0; font-size: 14px; color: #666;">아래 카카오톡 선물 교환 코드를 등록하여 선물을 받아보세요.</br>코드등록 방법 : 카카오톡 > 선물하기 > 선물함 > 선물코드 등록</p>
          <div class="gift-code">${gift.code}</div>
        </div>
      `;
    } else {
      // 잘못된 주소로 접속했을 때 (예: id가 없거나 1~9가 아닐 때)
      contentArea.innerHTML = `
        <div class="gift-icon">❓</div>
        <div class="error">유효하지 않은 QR 코드입니다.</div>
        <p>정상적인 코드를 스캔해주세요.</p>
      `;
    }
  </script>

</body>
</html>
